<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>MatePHP - DTO Library</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description"
    content="High-performance, modern and framework-agnostic DTO library for PHP 8.4+. Optimized for low latency and type safety.">
  <meta name="keywords"
    content="PHP 8.4, DTO, Data Transfer Object, Asymmetric Visibility, Type Safety, Performance, Swoole, Framework Agnostic">

  <meta property="og:url" content="https://mate-php.github.io/dto/">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://mate-php.github.io/dto/">

  <style>
    :root {
      --theme-color: #7faecc;
    }
  </style>
</head>

<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'MatePHP / DTO',
      logo: 'assets/mate-logo.png',
      repo: 'mate-php/dto',
      auto2top: true,
      loadSidebar: true,
      loadNavbar: true, // Enabled navbar
      subMaxLevel: 3,
      alias: {
        '/es/.*_sidebar.md': '/es/_sidebar.md',
        '/.*_sidebar.md': '/_sidebar.md',
      },
      nameLink: {
        '/es/': '/es/',
        '/': '/'
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      darklightTheme: {
        siteFont: 'Inter, system-ui, -apple-system, sans-serif',
        defaultTheme: 'light',
        codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
        bodyFontSize: '16px',
        dark: {
          accent: '#7faecc',
          toogleBackground: '#ffffff',
          background: '#091a28',
          textColor: '#b4b4b4',
          codeTextColor: '#ffffff',
          codeBackgroundColor: '#0e2233',
          borderColor: '#0d2538',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          sidebarSublink: '#b4b4b4',
          codeTypeColor: '#ffffff',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
        },
        light: {
          accent: '#7faecc',
          toogleBackground: '#091a28',
          background: '#ffffff',
          textColor: '#34495e',
          codeTextColor: '#525252',
          codeBackgroundColor: '#f8f8f8',
          borderColor: 'rgba(0,0,0,.07)',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          sidebarSublink: '#505d6b',
          codeTypeColor: '#091a28',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
        }
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript">
